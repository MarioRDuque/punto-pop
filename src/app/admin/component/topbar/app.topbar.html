<div class="layout-topbar">
  <div class="layout-topbar-logo-container">
    <button class="layout-menu-button layout-topbar-action" (click)="layoutService.onMenuToggle()" aria-label="Abrir menú">
      <i class="pi pi-bars"></i>
    </button>
    <a class="layout-topbar-logo" routerLink="/" aria-label="Punto Pop">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="1" width="30" height="30" rx="8" fill="var(--primary-color)" />
        <circle cx="16" cy="16" r="9" fill="none" stroke="rgba(10,11,20,0.85)" stroke-width="1.5" />
        <circle cx="16" cy="16" r="3" fill="rgba(10,11,20,0.9)" />
      </svg>
      <span class="topbar-brand-text">Punto<em>Pop</em></span>
    </a>
  </div>

  <!-- Command search (centrado) -->
  <div class="layout-topbar-search">
    <i class="pi pi-search"></i>
    <span>Buscar productos, clientes, comprobantes…</span>
    <kbd>⌘K</kbd>
  </div>

  <div class="layout-topbar-actions">
    <div class="layout-config-menu">
      <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()" [attr.aria-label]="layoutService.isDarkTheme() ? 'Modo claro' : 'Modo oscuro'">
        <i [ngClass]="{ 'pi ': true, 'pi-moon': layoutService.isDarkTheme(), 'pi-sun': !layoutService.isDarkTheme() }"></i>
      </button>
      <div class="relative">
        <button class="layout-topbar-action layout-topbar-action-highlight" pStyleClass="@next"
          enterFromClass="hidden" enterActiveClass="animate-scalein" leaveToClass="hidden"
          leaveActiveClass="animate-fadeout" [hideOnOutsideClick]="true" aria-label="Personalizar tema">
          <i class="pi pi-palette"></i>
        </button>
        <app-configurator />
      </div>
    </div>

    <button class="layout-topbar-menu-button layout-topbar-action" pStyleClass="@next" enterFromClass="hidden"
      enterActiveClass="animate-scalein" leaveToClass="hidden" leaveActiveClass="animate-fadeout"
      [hideOnOutsideClick]="true" aria-label="Más acciones">
      <i class="pi pi-ellipsis-v"></i>
    </button>

    <div class="layout-topbar-menu hidden lg:block">
      <div class="layout-topbar-menu-content">

        <!-- Notificaciones -->
        <button type="button" class="layout-topbar-action" aria-label="Notificaciones">
          <i class="pi pi-bell"></i>
          <span class="topbar-bell-dot" aria-hidden="true"></span>
        </button>

        <!-- Avatar: foto o iniciales -->
        <button type="button" class="layout-topbar-action layout-topbar-action--avatar" pStyleClass="@next"
          enterFromClass="hidden" enterActiveClass="animate-scalein"
          leaveToClass="hidden" leaveActiveClass="animate-fadeout"
          [hideOnOutsideClick]="true" aria-label="Menú de usuario">
          <div class="topbar-avatar">
            @if (fotoUsuario()) {
              <img [src]="fotoUsuario()!" [alt]="iniciales()" class="topbar-avatar-img" />
            } @else {
              <span class="topbar-avatar-initials">{{ iniciales() }}</span>
            }
          </div>
        </button>

        <!-- Menú de usuario desplegable -->
        <div class="hidden topbar-user-menu">
          <div class="topbar-user-header">
            <div class="topbar-user-avatar-lg">
              @if (fotoUsuario()) {
                <img [src]="fotoUsuario()!" [alt]="iniciales()" class="topbar-avatar-img-lg" />
              } @else {
                <span class="topbar-avatar-initials-lg">{{ iniciales() }}</span>
              }
            </div>
            <div>
              <div class="topbar-user-name">{{ nombreCompleto() }}</div>
              <div class="topbar-user-role">{{ authService.usuario()?.roles?.[0]?.rolDescripcion ?? '' }}</div>
            </div>
          </div>
          <div class="topbar-user-divider"></div>
          <a class="topbar-user-item" routerLink="/">
            <i class="pi pi-user"></i>
            <span>Mi perfil</span>
          </a>
          <a class="topbar-user-item" routerLink="/configuracion/empresa">
            <i class="pi pi-id-card"></i>
            <span>Mi empresa</span>
          </a>
          <div class="topbar-user-divider"></div>
          <button type="button" class="topbar-user-item topbar-user-logout" (click)="cerrarSesion()">
            <i class="pi pi-sign-out"></i>
            <span>Cerrar sesión</span>
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
