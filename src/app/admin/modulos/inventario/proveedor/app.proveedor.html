<app-tabs-card
    [tabActivo]="tabsState.tabActivo()"
    [tabDeshabilitado]="tabsState.tabDeshabilitado()"
    [showActions]="showFormActions"
    [loading]="cargando.loading()"
    labelListado="Proveedores"
    labelCrear="Nuevo proveedor"
    (onTabChange)="onTabChange($event)"
    (onGuardar)="onGuardar()"
    (onCancelar)="onCancelar()"
>
    <ng-template #listado><app-proveedor-listado /></ng-template>
    <ng-template #crear><app-proveedor-formulario /></ng-template>
    <ng-template #editar><app-proveedor-formulario /></ng-template>
</app-tabs-card>
