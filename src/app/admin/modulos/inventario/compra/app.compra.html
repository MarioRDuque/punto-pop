<app-tabs-card
    [tabActivo]="tabsState.tabActivo()"
    [tabDeshabilitado]="tabsState.tabDeshabilitado()"
    [showActions]="showFormActions"
    [loading]="cargando.loading()"
    labelEditar="Ver compra"
    iconEditar="pi pi-eye"
    [esVisualizacion]="true"
    [showBorrador]="false"
    (onTabChange)="onTabChange($event)"
    (onGuardar)="onGuardar()"
    (onCancelar)="onCancelar()"
>
    <ng-template #listado><app-compra-listado /></ng-template>
    <ng-template #crear><app-compra-formulario /></ng-template>
    <ng-template #editar><app-compra-formulario /></ng-template>
    @if (!showFormActions) {
    <app-exportar-imprimir actions (exportar)="exportar()" (imprimir)="imprimir()" />
    }
</app-tabs-card>
