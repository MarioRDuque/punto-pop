<p-fluid>
    <p-panel value="0">
        <div class="card">
            <p-tabs lazy [value]="tabsState.tabActivo()" (valueChange)="onTabChange($event)">
                <p-tablist>
                    <p-tab [value]="Tabs.LISTADO"><i class="pi pi-list"></i><span> Compras</span></p-tab>
                    <p-tab [value]="Tabs.CREAR"><i class="pi pi-plus"></i><span> Nueva Compra</span></p-tab>
                </p-tablist>
                <p-tabpanels>
                    <p-tabpanel [value]="Tabs.LISTADO">
                        <app-compra-listado></app-compra-listado>
                    </p-tabpanel>
                    <p-tabpanel [value]="Tabs.CREAR">
                        @if (tabsState.tabActivo() === Tabs.CREAR) {
                        <app-compra-formulario></app-compra-formulario>
                        }
                    </p-tabpanel>
                </p-tabpanels>
            </p-tabs>
        </div>
    </p-panel>
</p-fluid>
