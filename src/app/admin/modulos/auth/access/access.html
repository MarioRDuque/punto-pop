<app-floating-configurator />
<div class="pp-auth-shell">
  <!-- Decorative bg -->
  <div class="pp-auth-bg" aria-hidden="true">
    <div class="pp-auth-grid"></div>
    <div class="pp-auth-aurora pp-auth-aurora--warn"></div>
  </div>

  <div class="pp-auth-card">
    <div class="pp-auth-icon pp-auth-icon--warn" aria-hidden="true">
      <i class="pi pi-lock"></i>
    </div>

    <div class="pp-auth-code">403 · ACCESO DENEGADO</div>
    <h1 class="pp-auth-title">No tienes permiso<br />para ver esto.</h1>
    <p class="pp-auth-lead">
      Tu rol actual no incluye acceso a este recurso. Si crees que es un error,
      pide a un administrador que revise tus permisos.
    </p>

    <div class="pp-auth-actions">
      <p-button label="Ir al inicio" icon="pi pi-arrow-left" routerLink="/" />
      <a routerLink="/configuracion/rol" class="pp-auth-link">Ver mis roles</a>
    </div>
  </div>
</div>
