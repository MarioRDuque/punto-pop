<p-tabs lazy [value]="tabsState.tabActivo()" (valueChange)="onTabChange($event)">
    <p-tablist>
        <p-tab [value]="Tabs.LISTADO"><i class="pi pi-list"></i><span> Lista de unidades de medida</span></p-tab>
        <p-tab [value]="Tabs.CREAR"><i class="pi pi-plus"></i><span> Crear unidad de medida</span></p-tab>
        <p-tab [disabled]="tabsState.tabDeshabilitado()" [value]="Tabs.EDITAR"><i class="pi pi-pencil"></i><span> Editar unidad de medida</span></p-tab>

        @if (showFormActions) {
        <div class="ml-auto flex items-center gap-1 px-3">
            <p-button label="Borrador" icon="pi pi-replay" size="small" [text]="true" severity="secondary" />
            <p-button [label]="tabsState.tabActivo() === Tabs.EDITAR ? 'Actualizar' : 'Guardar'"
                [icon]="tabsState.tabActivo() === Tabs.EDITAR ? 'pi pi-check' : 'pi pi-save'"
                size="small" [outlined]="true"
                [loading]="cargando.loading()"
                (onClick)="onGuardar()" />
            <p-button icon="pi pi-times" size="small" [text]="true" severity="secondary"
                pTooltip="Cerrar" tooltipPosition="top"
                (onClick)="onCancelar()" />
        </div>
        }
    </p-tablist>
    <p-tabpanels>
        <p-tabpanel [value]="Tabs.LISTADO">
            <app-unidad-medida-listado></app-unidad-medida-listado>
        </p-tabpanel>
        <p-tabpanel [value]="Tabs.CREAR">
            @if (tabsState.tabActivo() === Tabs.CREAR) {
            <app-unidad-medida-formulario></app-unidad-medida-formulario>
            }
        </p-tabpanel>
        <p-tabpanel [value]="Tabs.EDITAR">
            @if (tabsState.tabActivo() === Tabs.EDITAR) {
            <app-unidad-medida-formulario></app-unidad-medida-formulario>
            }
        </p-tabpanel>
    </p-tabpanels>
</p-tabs>
