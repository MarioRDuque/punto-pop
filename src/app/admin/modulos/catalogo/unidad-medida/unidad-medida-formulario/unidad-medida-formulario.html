<form [formGroup]="unidadForm" (ngSubmit)="realizarAccion()" autocomplete="off" novalidate>
    <app-header-crud [subtitulo]="subtitulo" [esFormulario]="true"></app-header-crud>
    <div class="flex flex-col md:flex-row gap-4 w-full" style="padding-top: 8px;">
        <div class="card flex flex-col gap-0 w-full p-0">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                <div class="field">
                    <app-input label="Código" id="codigo" [autofocus]="accion() === accionEnum.CREAR" />
                </div>
                <div class="field">
                    <app-input label="Nombre" id="nombre" [autofocus]="accion() === accionEnum.EDITAR" />
                </div>
                <div class="field">
                    <app-input label="Abreviatura" id="abreviatura" />
                </div>
            </div>
            <br>
            <div class="grid grid-cols-1 md:grid-cols-1 gap-6 w-full">
                <div class="flex justify-center">
                    <app-toggle-switch label="Estado" id="estado" />
                </div>
            </div>
        </div>
    </div>
</form>
