<app-listado-toolbar
  placeholder="Buscar por nombre, cédula, email o teléfono..."
  searchShortcut="/"
  [tabs]="tabs()"
  [activeTab]="activeFilter()"
  [searchValue]="searchQuery()"
  (tabChange)="setFilter($any($event))"
  (searchChange)="onSearch($event)"
/>

<app-grid
  [rowData]="filteredClientes()"
  [rowHeight]="52"
  [mostrarFiltro]="false"
  (buscarEnBdd)="buscar($event)"
  (consultarObj)="consultarObj($event)"
  (cambiarEstados)="cambiarEstados($event)"
  (eliminarObj)="eliminarObj($event)"
  [colDefs]="colDefs"
  [exportarSignal]="exportarSignal"
  [imprimirSignal]="imprimirSignal"
  [campoEstado]="'estado'"
  [subtitulo]="subtitulo"
/>
