<app-tabs-card
    [tabActivo]="tabsState.tabActivo()"
    [tabDeshabilitado]="tabsState.tabDeshabilitado()"
    [showActions]="showFormActions"
    [loading]="cargando.loading()"
    (onTabChange)="onTabChange($event)"
    (onGuardar)="onGuardar()"
    (onCancelar)="onCancelar()"
>
    <ng-template #listado><app-cliente-listado /></ng-template>
    <ng-template #crear><app-cliente-formulario /></ng-template>
    <ng-template #editar><app-cliente-formulario /></ng-template>
    @if (!showFormActions) {
    <div actions class="ml-auto flex items-center gap-1">
        <p-button icon="pi pi-upload" size="small" [text]="true" severity="secondary"
            pTooltip="Importar" tooltipPosition="top" (onClick)="importar()" />
        <p-button icon="pi pi-download" size="small" [text]="true" severity="secondary"
            pTooltip="Exportar" tooltipPosition="top"
            (onClick)="exportar()" />
        <p-button icon="pi pi-print" size="small" [text]="true" severity="secondary"
            pTooltip="Imprimir" tooltipPosition="top"
            (onClick)="imprimir()" />
    </div>
    }
</app-tabs-card>
