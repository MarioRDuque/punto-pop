<!-- Barra de filtros -->
<div class="flex flex-wrap items-center gap-2 p-2 mb-2 surface-ground border-round">
  <div class="flex items-center gap-1">
    <span class="text-sm text-color-secondary white-space-nowrap">Desde:</span>
    <p-datepicker [ngModel]="desde()" (ngModelChange)="desde.set($event)"
                  dateFormat="dd/mm/yy" [showIcon]="true" size="small" />
  </div>
  <div class="flex items-center gap-1">
    <span class="text-sm text-color-secondary white-space-nowrap">Hasta:</span>
    <p-datepicker [ngModel]="hasta()" (ngModelChange)="hasta.set($event)"
                  dateFormat="dd/mm/yy" [showIcon]="true" size="small" />
  </div>
  <p-select [ngModel]="estado()" (ngModelChange)="estado.set($event ?? null)"
            [options]="estadosOptions" optionLabel="label" optionValue="value"
            placeholder="Todos los estados" [showClear]="true" size="small" styleClass="min-w-44" />
  <p-button label="Buscar" icon="pi pi-search" size="small" (onClick)="cargarConFiltros()" />

  @if (totalVentas() > 0) {
    <span class="ml-auto text-sm text-color-secondary">
      {{ listaVentas().length }}
      @if (hayMasDatos()) {
        <span> de {{ totalVentas() }}
          <i class="pi pi-exclamation-triangle text-orange-400 ml-1"
             pTooltip="Hay más resultados. Reduce el rango de fechas para verlos."
             tooltipPosition="top"></i>
        </span>
      }
      ventas
    </span>
  }
</div>

<app-grid [rowData]="listaVentas()" (buscarEnBdd)="buscar($event)"
    (consultarObj)="consultarObj($event)"
    [colDefs]="colDefs" [exportarSignal]="exportarSignal" [imprimirSignal]="imprimirSignal"
    [subtitulo]="subtitulo"></app-grid>
