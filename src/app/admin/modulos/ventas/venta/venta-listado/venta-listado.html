<app-listado-toolbar
  [showSearch]="false"
  [tabs]="tabs()"
  [activeTab]="activeFilter()"
  (tabChange)="setFilter($any($event))"
>
  <div slot="start" class="flex items-center gap-2 flex-shrink-0">
    <span class="text-sm text-color-secondary white-space-nowrap">Desde:</span>
    <p-datepicker [ngModel]="desde()" (ngModelChange)="desde.set($event)"
                  dateFormat="dd/mm/yy" [showIcon]="true" size="small" />
    <span class="text-sm text-color-secondary white-space-nowrap">Hasta:</span>
    <p-datepicker [ngModel]="hasta()" (ngModelChange)="hasta.set($event)"
                  dateFormat="dd/mm/yy" [showIcon]="true" size="small" />
    <p-button label="Buscar" icon="pi pi-search" size="small" (onClick)="cargarConFiltros()" />
  </div>
  @if (totalVentas() > 0) {
    <span slot="end" class="ml-auto text-sm text-color-secondary flex-shrink-0">
      {{ filteredVentas().length }}
      @if (hayMasDatos()) {
        <span> de {{ totalVentas() }}
          <i class="pi pi-exclamation-triangle text-orange-400 ml-1"
             pTooltip="Hay más resultados. Reduce el rango de fechas para verlos."
             tooltipPosition="top"></i>
        </span>
      }
      ventas
    </span>
  }
</app-listado-toolbar>

<app-grid
  [rowData]="filteredVentas()"
  [rowHeight]="52"
  [mostrarFiltro]="false"
  (buscarEnBdd)="buscar($event)"
  (consultarObj)="consultarObj($event)"
  [colDefs]="colDefs"
  [exportarSignal]="exportarSignal"
  [imprimirSignal]="imprimirSignal"
  [subtitulo]="subtitulo">
</app-grid>
