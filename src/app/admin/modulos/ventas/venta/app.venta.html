<app-tabs-card
    [tabActivo]="tabsState.tabActivo()"
    [tabDeshabilitado]="tabsState.tabDeshabilitado()"
    [showActions]="showFormActions"
    [loading]="cargando.loading()"
    labelEditar="Ver venta"
    iconEditar="pi pi-eye"
    [esVisualizacion]="true"
    [showBorrador]="false"
    (onTabChange)="onTabChange($event)"
    (onGuardar)="onGuardar()"
    (onCancelar)="onCancelar()"
>
    <ng-template #listado><app-venta-listado /></ng-template>
    <ng-template #crear><app-venta-formulario /></ng-template>
    <ng-template #editar><app-venta-formulario /></ng-template>
</app-tabs-card>
