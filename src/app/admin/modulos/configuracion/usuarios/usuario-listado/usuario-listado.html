<app-header-crud [subtitulo]="subtitulo"></app-header-crud>
<form [formGroup]="filtrarUsuario" (ngSubmit)="buscar()" autocomplete="off" novalidate>
    @if (tabsState.esFiltrar()) {
    <p-fieldset legend="Filtrar por:">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
            <!-- Apellido -->
            <div class="field">
                <app-input label="Apellido" id="usuApellidos" />
            </div>
            <!-- Nombre -->
            <div class="field">
                <app-input label="Nombre" id="usuNombre" />
            </div>
            <div class="field">
                <p-button icon="pi pi-search" [rounded]="true" [raised]="true" severity="secondary" pTooltip="Buscar"
                    tooltipPosition="top" tooltipStyleClass="small-tooltip" />
            </div>
        </div>
    </p-fieldset>
    }
</form>
<app-grid [rowData]="listaUsuarios()" (buscarEnBdd)="buscar($event)" [colDefs]="colDefs"></app-grid>
