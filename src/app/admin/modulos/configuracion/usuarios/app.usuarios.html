<app-tabs-card
    [tabActivo]="tabsState.tabActivo()"
    [tabDeshabilitado]="tabsState.tabDeshabilitado()"
    [showActions]="showFormActions"
    [loading]="cargando.loading()"
    [iconListado]="ICONSCONSTANT.USERS"
    [iconCrear]="ICONSCONSTANT.AGREGAR_USER"
    [iconEditar]="ICONSCONSTANT.EDITAR_USUARIO"
    (onTabChange)="onTabChange($event)"
    (onGuardar)="onGuardar()"
    (onCancelar)="onCancelar()"
>
    <app-usuario-listado panel-listado />
    <app-usuario-formulario panel-crear />
    <app-usuario-formulario panel-editar />
</app-tabs-card>
