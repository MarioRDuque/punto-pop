<p-fluid>
    <p-panel value="0" [toggleable]="true">
        <ng-template #header>
            <div class="flex items-center gap-2 pt-15 pt-3">
                <p-avatar icon="pi pi-user" shape="circle" />
                <span class="font-bold">REGISTRO USUARIO</span>
            </div>
        </ng-template>

        <ng-template #icons>
            <p-button icon="pi pi-save" pTooltip="Guardar" tooltipPosition="right" severity="info" rounded text
                (click)="menu.toggle($event)" />
            <p-menu #menu id="config_menu" [model]="items" [popup]="true" />
        </ng-template>

        <div class="flex flex-col md:flex-row gap-4 w-full">
            <div class="card flex flex-col gap-0 w-full p-0">
                <p-fieldset legend="Datos" [toggleable]="true">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                        <!-- Apellidos -->
                        <div class="field">
                            <p-floatlabel variant="on">
                                <input pInputText id="Apellidos" autocomplete="off" type="text" />
                                <label for="Apellidos">Apellidos</label>
                            </p-floatlabel>
                        </div>
                        <!-- Nombre -->
                        <div class="field">
                            <p-floatlabel variant="on">
                                <input pInputText id="Nombre" autocomplete="off" type="text" />
                                <label for="Nombre">Nombre</label>
                            </p-floatlabel>
                        </div>
                        <!-- Usuario -->
                        <div class="field">
                            <p-floatlabel variant="on" class="w-full">
                                <p-iconfield class="w-full">
                                    <p-inputicon class="pi pi-user"></p-inputicon>
                                    <input pInputText id="Usuario" type="text" class="w-full" autocomplete="off" />
                                </p-iconfield>
                                <label for="Usuario">Usuario</label>
                            </p-floatlabel>
                        </div>
                        <!-- Correo -->
                        <div class="field md:col-span-2">
                            <p-floatlabel variant="on">
                                <input pInputText id="Correo electrónico" autocomplete="off" type="text" />
                                <label for="Correo electrónico">Correo electrónico</label>
                            </p-floatlabel>
                        </div>
                        <!-- Contraseña -->
                        <div class="field">
                            <p-floatlabel variant="on">
                                <p-password [toggleMask]="true" [feedback]="false" />
                                <label for="Contraseña">Contraseña</label>
                            </p-floatlabel>
                        </div>
                    </div>
                </p-fieldset>
                <p-fieldset legend="Contacto" [toggleable]="true">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                        <!-- Telefono -->
                        <div class="field">
                            <p-floatlabel variant="on">
                                <input pInputText id="Telefono" autocomplete="off" type="text" />
                                <label for="Telefono">Telefono</label>
                            </p-floatlabel>
                        </div>
                        <!-- Dirección -->
                        <div class="field  md:col-span-2">
                            <p-floatlabel variant="on" class="w-full">
                                <p-iconfield class="w-full">
                                    <p-inputicon class="pi pi-map-marker"></p-inputicon>
                                    <input pInputText id="direccion" type="text" class="w-full" autocomplete="off" />
                                </p-iconfield>
                                <label for="direccion">Dirección</label>
                            </p-floatlabel>
                        </div>
                    </div>
                </p-fieldset>
                <p-fieldset legend="Datos adicionales" [toggleable]="true">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                        <!-- Rol -->
                        <div class="field">
                            <p-floatlabel variant="on" class="w-full multiselect-float">
                                <p-multiselect id="roles" class="w-full" [options]="dropdownValues"
                                    [(ngModel)]="dropdownValue" optionLabel="name" display="chip" placeholder=" "
                                    [showClear]="true">
                                    <ng-template pTemplate="selecteditems" let-items>
                                        @for (item of items; track item.code) {
                                        <div
                                            class="inline-flex items-center py-1 px-2 bg-primary text-primary-contrast rounded-border mr-2">
                                            {{ item.name }}
                                        </div>
                                        }
                                    </ng-template>
                                    <ng-template pTemplate="item" let-item>
                                        <div class="flex items-center">
                                            {{ item.name }}
                                        </div>
                                    </ng-template>
                                </p-multiselect>

                                <label for="roles">Seleccionar rol</label>
                            </p-floatlabel>
                        </div>
                        <!-- Estado -->
                        <div class="flex justify-center">
                            <div class="estado-field items-center">
                                <label class="estado-label">
                                    <span [class.text-green]="checked" [class.text-red]="!checked">Estado: {{ checked ?
                                        'Activo' : 'Inactivo' }}</span>
                                </label>
                                <p-toggleswitch [(ngModel)]="checked">
                                    <ng-template #handle let-checked="checked">
                                        <i [ngClass]="['!text-xs', 'pi', checked ? 'pi-check' : 'pi-times']"></i>
                                    </ng-template>
                                </p-toggleswitch>

                            </div>
                        </div>
                    </div>
                    <br>
                    <!-- IMAGEN -->
                    <p-fieldset legend="Foto">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                            <div class="md:col-span-3 w-full">
                                <app-fileupload></app-fileupload>
                            </div>
                        </div>
                    </p-fieldset>
                </p-fieldset>
            </div>
        </div>

        <ng-template #footer>
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <p-button icon="pi pi-eraser" pTooltip="Limpiar" tooltipPosition="right" severity="warn" rounded
                        text></p-button>
                    <p-button icon="pi pi-bookmark" severity="secondary" rounded text></p-button>
                </div>
                <span class="text-surface-500 dark:text-surface-400">VetHome</span>
            </div>
        </ng-template>
    </p-panel>
</p-fluid>
