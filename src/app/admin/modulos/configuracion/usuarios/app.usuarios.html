<p-fluid>
    <form [formGroup]="usuarioForm" (ngSubmit)="registrar()">
            <p-progressbar mode="indeterminate" [style]="{'height': '6px'}" />
            <p-blockui [target]="pnl" [blocked]="true" />
        <p-panel #pnl value="0">
            <app-header-crud></app-header-crud>
            <div class="flex flex-col md:flex-row gap-4 w-full">
                <div class="card flex flex-col gap-0 w-full p-0">
                    <p-fieldset legend="Datos" [toggleable]="true">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                            <!-- Usuario -->
                            <div class="field">
                                <p-floatlabel variant="on" class="w-full">
                                    <p-iconfield class="w-full">
                                        <p-inputicon class="pi pi-user"></p-inputicon>
                                        <input pInputText id="Usuario" formControlName="usuario" class="w-full"
                                            autocomplete="off" appErrors />
                                    </p-iconfield>
                                    <label for="Usuario">Usuario</label>
                                </p-floatlabel>
                            </div>
                            <!-- Nombre -->
                            <div class="field">
                                <p-floatlabel variant="on">
                                    <input pInputText id="Nombre" formControlName="nombre" autocomplete="off"
                                        appErrors />
                                    <label for="Nombre">Nombre</label>
                                </p-floatlabel>
                            </div>
                            <!-- Apellidos -->
                            <div class="field">
                                <p-floatlabel variant="on">
                                    <input pInputText id="Apellidos" formControlName="apellidos" autocomplete="off" />
                                    <label for="Apellidos">Apellidos</label>
                                </p-floatlabel>
                            </div>
                            <!-- Correo -->
                            <div class="field md:col-span-2">
                                <p-floatlabel variant="on">
                                    <input pInputText id="Correo electrónico" formControlName="correoElectronico"
                                        autocomplete="off" appErrors />
                                    <label for="Correo electrónico">Correo electrónico</label>
                                </p-floatlabel>
                            </div>
                            <!-- Contraseña -->
                            <div class="field">
                                <p-floatlabel variant="on">
                                    <p-password [toggleMask]="true" autocomplete="current-password" [feedback]="false"
                                        id="Contraseña" formControlName="clave" [feedback]="false" appErrors />
                                    <label for="Contraseña">Contraseña</label>
                                </p-floatlabel>
                            </div>
                        </div>
                    </p-fieldset>
                    <p-fieldset legend="Contacto" [toggleable]="true">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                            <!-- Telefono -->
                            <div class="field">
                                <p-floatlabel variant="on">
                                    <input pInputText id="Telefono" formControlName="telefono" autocomplete="off"
                                        pKeyFilter="num" />
                                    <label for="Telefono">Telefono</label>
                                </p-floatlabel>
                            </div>
                            <!-- Dirección -->
                            <div class="field  md:col-span-2">
                                <p-floatlabel variant="on" class="w-full">
                                    <p-iconfield class="w-full">
                                        <p-inputicon class="pi pi-map-marker"></p-inputicon>
                                        <input pInputText id="direccion" formControlName="direccion" class="w-full"
                                            autocomplete="off" />
                                    </p-iconfield>
                                    <label for="direccion">Dirección</label>
                                </p-floatlabel>
                            </div>
                        </div>
                    </p-fieldset>
                    <p-fieldset legend="Datos adicionales" [toggleable]="true">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                            <!-- Rol -->
                            <div class="field">
                                <p-floatlabel variant="on" class="w-full multiselect-float">
                                    <p-multiselect id="roles" class="w-full" [options]="roles" optionLabel="name"
                                        display="chip" placeholder=" " [showClear]="true" formControlName="rol"
                                        name="rol">
                                        <ng-template pTemplate="selecteditems" let-items>
                                            @for (item of items; track item.code) {
                                            <div
                                                class="inline-flex items-center py-1 px-2 bg-primary text-primary-contrast rounded-border mr-2">
                                                {{ item.name }}
                                            </div>
                                            }
                                        </ng-template>
                                        <ng-template pTemplate="item" let-item>
                                            <div class="flex items-center">
                                                {{ item.name }}
                                            </div>
                                        </ng-template>
                                    </p-multiselect>

                                    <label for="roles">Seleccionar rol</label>
                                </p-floatlabel>
                            </div>
                            <!-- Estado Usuario-->
                            <div class="flex justify-center">
                                <div class="estado-field items-center">
                                    <label class="estado-label">
                                        <span [class.text-green]="usuarioForm.get('estado')?.value"
                                            [class.text-red]="!usuarioForm.get('estado')?.value">
                                            Estado: {{ usuarioForm.get('estado')?.value ? 'Activo' : 'Inactivo' }}
                                        </span>
                                    </label>
                                    <p-toggleswitch formControlName="estado" appErrors>
                                        <ng-template #handle let-checked>
                                            <i [ngClass]="['!text-xs', 'pi', checked ? 'pi-check' : 'pi-times']"></i>
                                        </ng-template>
                                    </p-toggleswitch>
                                </div>
                            </div>
                        </div>
                        <!-- IMAGEN -->
                        <p-fieldset legend="Foto">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                                <div class="md:col-span-3 w-full">
                                    <app-fileupload></app-fileupload>
                                </div>
                            </div>
                        </p-fieldset>
                    </p-fieldset>
                </div>
            </div>
        </p-panel>
    </form>
</p-fluid>
