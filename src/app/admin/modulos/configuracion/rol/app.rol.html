<app-tabs-card
    [tabActivo]="tabsState.tabActivo()"
    [tabDeshabilitado]="tabsState.tabDeshabilitado()"
    [showActions]="showFormActions"
    [loading]="cargando.loading()"
    labelListado="Roles"
    [iconListado]="ICONSCONSTANT.USERS"
    [iconCrear]="ICONSCONSTANT.AGREGAR_USER"
    [iconEditar]="ICONSCONSTANT.EDITAR_USUARIO"
    (onTabChange)="onTabChange($event)"
    (onGuardar)="onGuardar()"
    (onCancelar)="onCancelar()"
>
    <ng-template #listado><app-rol-listado /></ng-template>
    <ng-template #crear><app-rol-formulario /></ng-template>
    <ng-template #editar><app-rol-formulario /></ng-template>
    @if (!showFormActions) {
    <app-exportar-imprimir actions (exportar)="exportar()" (imprimir)="imprimir()" />
    }
</app-tabs-card>
