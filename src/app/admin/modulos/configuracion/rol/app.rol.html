<p-fluid>
    <p-panel value="0">
        <div class="card">
            <p-tabs lazy [value]="tabsState.tabActivo()" (valueChange)="onTabChange($event)">
                <p-tablist>
                    <p-tab [value]="Tabs.LISTADO"><i class="{{ICONSCONSTANT.USERS}}"></i><span> Lista de
                            rol</span></p-tab>
                    <p-tab [value]="Tabs.CREAR"><i class="{{ICONSCONSTANT.AGREGAR_USER}}"></i><span> Crear
                            rol</span></p-tab>
                    <p-tab [disabled]="tabsState.tabDeshabilitado()" [value]="Tabs.EDITAR"><i
                            class="{{ICONSCONSTANT.EDITAR_USUARIO}}"></i><span> Editar rol</span></p-tab>
                </p-tablist>
                <p-tabpanels>
                    <p-tabpanel [value]="Tabs.LISTADO">
                        <app-rol-listado></app-rol-listado>
                    </p-tabpanel>
                    <p-tabpanel [value]="Tabs.CREAR">
                        @if (tabsState.tabActivo() === Tabs.CREAR) {
                        <app-rol-formulario></app-rol-formulario>
                        }
                    </p-tabpanel>
                    <p-tabpanel [value]="Tabs.EDITAR">
                        @if (tabsState.tabActivo() === Tabs.EDITAR) {
                        <app-rol-formulario></app-rol-formulario>
                        }
                    </p-tabpanel>
                </p-tabpanels>
            </p-tabs>
        </div>
    </p-panel>
</p-fluid>
